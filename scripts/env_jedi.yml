# JEDI environment for PanCirc-Fungi comparison
# Usage:
#   micromamba env create -f scripts/env_jedi.yml
#   micromamba activate pancirc-jedi
#
# JEDI implements the paper "JEDI: Circular RNA Prediction based on
# Junction Encoders and Deep Interaction among Splice Sites"
# (Bioinformatics 2021, doi:10.1093/bioinformatics/btab229)

name: pancirc-jedi

channels:
  - conda-forge
  - bioconda
  - main
  - defaults

dependencies:
  # ─── Python ────────────────────────────────────────────────────────────
  - python>=3.9
  - pip

  # ─── Data Processing ──────────────────────────────────────────────────
  - numpy>=1.24.0
  - pandas>=1.5.0
  - scikit-learn>=1.2.0
  - scipy>=1.10.0

  # ─── Sequence / Genomics ───────────────────────────────────────────────
  - biopython>=1.81
  - pyfaidx>=0.7.2

  # ─── Utilities ─────────────────────────────────────────────────────────
  - pyyaml>=6.0
  - tqdm>=4.64.0
  - absl-py>=1.0.0

  # ─── TensorFlow ─────────────────────────────────────────────────────────
  # CPU-only TF 2.15 (JEDI dataset ~2500 genes, CPU training in ~2 min/group).
  # GPU version (tensorflow-gpu) has JIT compilation issues with CUDA 12.2.
  - tensorflow==2.15.0=cpu*
